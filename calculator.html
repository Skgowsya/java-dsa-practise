
  <h2>Calculator</h2>
  <input type="number" id="num1" placeholder="enter first number : ">
  <input type="number" id="num2" placeholder="enter second number: ">
  <br><br>
  <button onclick="add()">Add</button>
  <buttton onclick="subtract()">Subtract</buttton>
  <button onclick="multiply()">Multiplication</button>
  <button onclick="division()">Division</button>
  <h3 id="result">Result: </h3>
  <script>
    function add(){
      let a=document.getElementById("num1").value;
      let b=document.getElementById("num2").value;
      document.getElementById("result").innerHTML="Result: "+(Number(a)+Number(b));
    }
    function subtract(){
      let a=document.getElementById("num1").value;
      let b=document.getElementById("num2").value;
      document.getElementById("result").innerHTML="Result: "+(a - b);
    }
    function multiply(){
      let a=document.getElementById("num1").value;
      let b=document.getElementById("num2").value;
      document.getElementById("result").innerHTML="Result: "+(a * b);
    }
    function division(){
      let a=document.getElementById("num1").value;
      let b=document.getElementById("num2").value;
      document.getElementById("result").innerHTML="Result: "+( a / b);
    }
  </script>
